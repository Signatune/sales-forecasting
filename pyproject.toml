description = "Sales forecasting scripts"
requires-python = ">=3.9"
dependencies = [
    "requests",
    "pandas",
    "pyarrow",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
