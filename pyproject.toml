[project]
name = "sales-forecasting"
version = "0.1.0"
description = "Sales forecasting scripts"
requires-python = ">=3.9"
dependencies = [
    "requests",
    "pandas",
    "pyarrow",
    # Postgres access (ADR 0003). db.py reads/writes the Sales pipeline tables.
    "psycopg[binary]",
]

[project.optional-dependencies]
dev = [
    "pytest",
]
# The DB integration tests only. `pytest --ephemeral-postgres` boots a throwaway
# local Postgres from this wheel (bundled binaries --- no Docker, no system
# install) and points TEST_DATABASE_URL at it. Not needed for a database-less
# dev install: bare `pytest` skips the integration tests, so the suite still
# runs on a `dev`-only install.
testdb = [
    "pgserver",
]
# The inspection notebook only. Nothing under test imports these, so the test
# suite still runs on a `dev`-only install.
notebook = [
    "matplotlib",
    "jupyter",
]
# The ETS / Holt-Winters candidate in model_comparison.py only, imported lazily
# and registered opt-in via candidates_with_ets(). Nothing under test requires
# it — the ETS tests importorskip it — so the suite still runs on a `dev`-only
# install and compare_models' default candidates never touch statsmodels.
experiment = [
    "statsmodels",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
