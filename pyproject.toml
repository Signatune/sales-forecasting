[project]
name = "sales-forecasting"
version = "0.1.0"
description = "Sales forecasting scripts"
requires-python = ">=3.9"
dependencies = [
    "requests",
    "pandas",
    "pyarrow",
]

[project.optional-dependencies]
dev = [
    "pytest",
]
# The inspection notebook only. Nothing under test imports these, so the test
# suite still runs on a `dev`-only install.
notebook = [
    "matplotlib",
    "jupyter",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
